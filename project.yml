name: MasterConfig
options:
  bundleIdPrefix: com.onur
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages: {}

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    PRODUCT_BUNDLE_IDENTIFIER: com.onur.MasterConfig
    PRODUCT_NAME: MasterConfig
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_FILE: MasterConfig/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MasterConfig:
    type: application
    platform: macOS
    sources:
      - path: MasterConfig
        excludes:
          - Resources/Info.plist
          - MCP/
    resources:
      - path: MasterConfig/Resources
    settings:
      base:
        INFOPLIST_FILE: MasterConfig/Resources/Info.plist
    dependencies: []
    entitlements:
      path: MasterConfig/Resources/MasterConfig.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
